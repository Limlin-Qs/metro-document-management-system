<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文档管理系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="container mx-auto px-4 py-8">
    <!-- Header -->
    <header class="mb-8">
      <h1 class="text-4xl font-bold text-gray-800 mb-2">
        <i class="fas fa-file-alt text-blue-600"></i> 文档管理系统
      </h1>
      <p class="text-gray-600">轻松管理和分享你的文档</p>
    </header>

    <!-- Main Content -->
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
      <!-- Sidebar -->
      <div class="lg:col-span-1">
        <div class="bg-white rounded-lg shadow p-5">
          <h3 class="font-semibold text-lg mb-4 text-gray-700">
            <i class="fas fa-filter"></i> 筛选分类
          </h3>
          <div class="mb-4">
            <input 
              type="text" 
              id="searchInput" 
              placeholder="搜索文档..." 
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
          </div>
          <div id="categoryList" class="space-y-2">
            <div class="category-item active" data-category="all">
              <i class="fas fa-list"></i> 全部文档
            </div>
          </div>
        </div>

        <!-- Upload Stats -->
        <div class="bg-white rounded-lg shadow p-5 mt-6">
          <h3 class="font-semibold text-lg mb-3 text-gray-700">
            <i class="fas fa-chart-pie"></i> 统计信息
          </h3>
          <div class="space-y-2">
            <p class="flex justify-between text-sm">
              <span class="text-gray-600">文档总数:</span>
              <span id="totalDocs" class="font-semibold text-blue-600">0</span>
            </p>
            <p class="flex justify-between text-sm">
              <span class="text-gray-600">分类总数:</span>
              <span id="totalCategories" class="font-semibold text-blue-600">0</span>
            </p>
          </div>
        </div>
      </div>

      <!-- Main Area -->
      <div class="lg:col-span-3">
        <!-- Upload Section -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
          <h3 class="font-semibold text-lg mb-4 text-gray-700">
            <i class="fas fa-cloud-upload-alt"></i> 上传文档
          </h3>
          <form id="uploadForm" class="space-y-4">
            <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-blue-500 transition-colors">
              <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-3"></i>
              <p class="text-gray-600 mb-2">拖拽文件到这里或点击选择</p>
              <p class="text-sm text-gray-400">支持最大 50MB 文件</p>
              <input 
                type="file" 
                id="fileInput" 
                class="hidden" 
                multiple
              >
              <button 
                type="button" 
                id="selectFileBtn" 
                class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors"
              >
                选择文件
              </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">分类</label>
                <input 
                  type="text" 
                  id="categoryInput" 
                  placeholder="例如：工作、个人、学习" 
                  class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">描述 (可选)</label>
                <input 
                  type="text" 
                  id="descriptionInput" 
                  placeholder="简短描述..." 
                  class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
              </div>
            </div>

            <div id="filePreview" class="hidden">
              <h4 class="font-medium text-sm text-gray-600 mb-2">已选择文件:</h4>
              <div id="fileList" class="space-y-2"></div>
            </div>

            <button 
              type="submit" 
              id="uploadBtn" 
              class="w-full md:w-auto px-6 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
              disabled
            >
              <i class="fas fa-upload"></i> 开始上传
            </button>
          </form>
        </div>

        <!-- Documents List -->
        <div class="bg-white rounded-lg shadow p-6">
          <div class="flex justify-between items-center mb-4">
            <h3 class="font-semibold text-lg text-gray-700">
              <i class="fas fa-folder-open"></i> 文档列表
            </h3>
            <span id="currentFilter" class="text-sm text-gray-500">显示全部</span>
          </div>
          <div id="documentsContainer" class="space-y-4">
            <div class="text-center py-12 text-gray-500">
              <i class="fas fa-inbox text-6xl mb-4 text-gray-300"></i>
              <p>暂无文档，上传第一个文档开始使用吧！</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-semibold">编辑文档信息</h3>
        <button id="closeModal" class="text-gray-400 hover:text-gray-600 text-2xl">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form id="editForm" class="space-y-4">
        <input type="hidden" id="editDocumentId">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">文件名</label>
          <input 
            type="text" 
            id="editFilename" 
            disabled
            class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-100"
          >
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">分类</label>
          <input 
            type="text" 
            id="editCategory" 
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">描述</label>
          <textarea 
            id="editDescription" 
            rows="3" 
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          ></textarea>
        </div>
        <div class="flex justify-end space-x-3 pt-2">
          <button type="button" id="cancelEdit" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">
            取消
          </button>
          <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
            保存
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
